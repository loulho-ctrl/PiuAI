<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piu AI - Chat Live (Mistral AI)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Interface Opérateur */
        #operator-panel {
            width: 320px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 10;
        }

        body.client-mode #operator-panel { display: none; }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        #ai-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #ai-header h1 { margin: 0; font-size: 1.2rem; color: #1e293b; font-weight: 700; }
        #ai-header .status-dot { width: 8px; height: 8px; background-color: #2ecc71; border-radius: 50%; margin-left: auto; }

        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 15px;
            padding: 20px;
        }

        .login-logo { width: 150px; height: 150px; font-size: 80px; display: flex; align-items: center; justify-content: center; }
        #chat-screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #f8fafc;
        }

        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; margin: 5px 0; word-wrap: break-word; font-size: 0.95rem; }
        .user-msg { background-color: #e1ffd4; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }

        .input-area { display: flex; padding: 15px; border-top: 1px solid #e2e8f0; gap: 10px; background: white; }
        input[type="text"], textarea { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; }
        .api-input { background-color: #34495e; border: 1px solid #7f8c8d; color: white; padding: 8px; border-radius: 5px; }

        button { padding: 10px 20px; border: none; background-color: #3498db; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .ai-btn { background-color: #2ecc71; }
        .ai-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div id="operator-panel">
        <h3>🧙‍♂️ Mode Magicien</h3>
        <label for="mistral-key">🔑 Ta Clé Mistral AI :</label>
        <!-- Ta clé est pré-remplie ici pour te faire gagner du temps -->
        <input type="password" id="mistral-key" class="api-input" value="lMPgW2PjMBQ2rZmdNN7pg8BsQiU3eqgs">
        
        <hr style="border-color: #4f5d73; width: 100%;">
        <p>Client Actif : <strong id="current-target-name">En attente...</strong></p>
        <hr style="border-color: #4f5d73; width: 100%;">

        <label for="operator-reply">Ta réponse manuelle :</label>
        <textarea id="operator-reply" rows="5" placeholder="Écris ici pour envoyer manuellement..."></textarea>
        
        <button class="ai-btn" id="generate-ai-btn">🤖 Générer & Envoyer direct</button>
        <button id="send-operator-btn">🚀 Envoyer manuel</button>
    </div>

    <div id="chat-container">
        <div id="ai-header">
            <div class="logo-container">🐣</div>
            <h1>Piu AI</h1>
            <div class="status-dot"></div>
        </div>

        <div id="login-screen">
            <div class="login-logo">🐣</div>
            <h2>Bienvenue sur Piu AI</h2>
            <input type="text" id="username-input" placeholder="Votre prénom...">
            <button id="start-chat-btn">Accéder au Chat</button>
        </div>

        <div id="chat-screen">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="customer-input" placeholder="Posez votre question...">
                <button id="send-customer-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            authDomain: "fakeai-fd878.firebaseapp.com",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878",
            storageBucket: "fakeai-fd878.firebasestorage.app",
            messagingSenderId: "57755076394",
            appId: "1:57755076394:web:b43c4209665d24149e0053",
            measurementId: "G-TM20HEFXRR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUsername = "";
        let lastUserMessage = ""; 
        const chatRef = ref(db, 'chat_session/messages');
        const userRef = ref(db, 'chat_session/user');

        document.getElementById('start-chat-btn').addEventListener('click', () => {
            const name = document.getElementById('username-input').value.trim();
            if(name !== "") {
                currentUsername = name;
                set(userRef, name);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            }
        });

        onValue(userRef, (snapshot) => {
            const name = snapshot.val();
            if(name) document.getElementById('current-target-name').innerText = `👤 ${name}`;
        });

        onValue(chatRef, (snapshot) => {
            const container = document.getElementById('messages');
            container.innerHTML = ""; 
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === 'user' ? 'user-msg' : 'ai-msg'}`;
                    div.innerText = msg.text;
                    container.appendChild(div);
                    if(msg.sender === 'user') {
                        lastUserMessage = msg.text.includes(':') ? msg.text.substring(msg.text.indexOf(':') + 2) : msg.text;
                    }
                });
                container.scrollTop = container.scrollHeight;
            }
        });

        document.getElementById('send-customer-btn').addEventListener('click', () => {
            const input = document.getElementById('customer-input');
            if(input.value.trim() !== "") {
                push(chatRef, { text: `${currentUsername}: ${input.value.trim()}`, sender: 'user', timestamp: Date.now() });
                input.value = "";
            }
        });

        // Fonction d'appel à Mistral AI (Envoi direct au chat Firebase)
        async function fetchMistralAI(question) {
            const apiKey = document.getElementById('mistral-key').value.trim();
            if(!apiKey) return alert("⚠️ Clé Mistral manquante !");

            try {
                const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "open-mistral-7b", // Modèle rapide, stable et gratuit
                        messages: [
                            { role: "system", content: "Tu es Piu AI, un petit poussin super intelligent et mignon dans sa coquille. Réponds de façon amicale, chaleureuse et utilise quelques expressions mignonnes ou emojis d'oiseaux." },
                            { role: "user", content: question }
                        ]
                    })
                });

                if(!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.message || "Erreur de réponse de l'API Mistral");
                }

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                
                // Envoi direct dans la base de données Firebase pour le client
                push(chatRef, { text: aiText, sender: 'ai', timestamp: Date.now() });

            } catch (error) {
                console.error(error);
                alert("Erreur avec Mistral AI : " + error.message);
            }
        }

        document.getElementById('generate-ai-btn').addEventListener('click', () => {
            if(!lastUserMessage) return alert("Pas de question reçue de la part du client !");
            fetchMistralAI(lastUserMessage);
        });

        document.getElementById('send-operator-btn').addEventListener('click', () => {
            const text = document.getElementById('operator-reply').value.trim();
            if(text !== "") {
                push(chatRef, { text: text, sender: 'ai', timestamp: Date.now() });
                document.getElementById('operator-reply').value = "";
            }
        });
    </script>
</body>
</html>
