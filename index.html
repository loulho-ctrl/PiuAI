<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Piu AI - Dashboard Multi-Client</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #operator-panel { width: 300px; background: #2c3e50; color: white; padding: 20px; overflow-y: auto; }
        #chat-container { flex: 1; display: flex; flex-direction: column; }
        #client-list { margin-top: 20px; }
        .client-btn { display: block; width: 100%; padding: 10px; margin-bottom: 5px; background: #34495e; color: white; border: none; cursor: pointer; text-align: left; }
        .client-btn:hover { background: #1abc9c; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #f8fafc; }
        .message { padding: 10px; margin: 5px; border-radius: 10px; max-width: 70%; }
        .user-msg { background: #e1ffd4; align-self: flex-end; }
        .ai-msg { background: #ffffff; border: 1px solid #ddd; }
        .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="operator-panel">
        <h3>🧙‍♂️ Mode Magicien</h3>
        <input type="password" id="mistral-key" value="lMPgW2PjMBQ2rZmdNN7pg8BsQiU3eqgs" style="width:90%">
        <hr>
        <h4>Clients connectés :</h4>
        <div id="client-list"></div>
        <hr>
        <button id="generate-ai-btn" style="background:#2ecc71; color:white; width:100%; padding:10px; border:none;">🤖 Générer réponse</button>
    </div>

    <div id="chat-container">
        <div id="login-screen" style="margin:auto; text-align:center;">
            <h2>Bienvenue sur Piu AI</h2>
            <input type="text" id="username-input" placeholder="Ton prénom...">
            <button id="start-chat-btn">Accéder au Chat</button>
        </div>

        <div id="chat-screen" style="display:none; flex-direction:column; height:100%;">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="customer-input" placeholder="Message...">
                <button id="send-customer-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            authDomain: "fakeai-fd878.firebaseapp.com",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878",
            storageBucket: "fakeai-fd878.firebasestorage.app",
            messagingSenderId: "57755076394",
            appId: "1:57755076394:web:b43c4209665d24149e0053",
            measurementId: "G-TM20HEFXRR"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let currentUsername = "";
        let activeChatRef = null;
        let lastUserMessage = "";

        // CLIENT: Connexion
        document.getElementById('start-chat-btn').addEventListener('click', () => {
            currentUsername = document.getElementById('username-input').value.trim();
            if(!currentUsername) return;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            activeChatRef = ref(db, 'chats/' + currentUsername + '/messages');
            listenToChat(activeChatRef);
        });

        // OPÉRATEUR: Lister les clients
        onValue(ref(db, 'chats'), (snapshot) => {
            const list = document.getElementById('client-list');
            list.innerHTML = "";
            const clients = snapshot.val() || {};
            Object.keys(clients).forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'client-btn';
                btn.innerText = "👤 " + name;
                btn.onclick = () => {
                    activeChatRef = ref(db, 'chats/' + name + '/messages');
                    listenToChat(activeChatRef);
                };
                list.appendChild(btn);
            });
        });

        function listenToChat(chatRef) {
            onValue(chatRef, (snapshot) => {
                const msgs = document.getElementById('messages');
                msgs.innerHTML = "";
                const data = snapshot.val() || {};
                Object.values(data).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === 'user' ? 'user-msg' : 'ai-msg'}`;
                    div.innerText = msg.text;
                    msgs.appendChild(div);
                    if(msg.sender === 'user') lastUserMessage = msg.text;
                });
            });
        }

        // Envoi Client
        document.getElementById('send-customer-btn').addEventListener('click', () => {
            const input = document.getElementById('customer-input');
            push(activeChatRef, { text: input.value, sender: 'user' });
            input.value = "";
        });

        // IA Mistral
        document.getElementById('generate-ai-btn').addEventListener('click', async () => {
            if(!activeChatRef) return alert("Choisis un client d'abord !");
            const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${document.getElementById('mistral-key').value}` },
                body: JSON.stringify({
                    model: "open-mistral-7b",
                    messages: [{ role: "user", content: lastUserMessage }]
                })
            });
            const data = await response.json();
            push(activeChatRef, { text: data.choices[0].message.content, sender: 'ai' });
        });
    </script>
</body>
</html>
