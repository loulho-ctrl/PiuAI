<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piu AI - Chat Live (Gemini)</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; margin: 0; display: flex; height: 100vh; }
        #operator-panel { width: 320px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; }
        body.client-mode #operator-panel { display: none; }
        #chat-container { flex: 1; display: flex; flex-direction: column; background: white; }
        #ai-header { padding: 15px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        #chat-screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background-color: #f8fafc; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; margin: 5px 0; }
        .user-msg { background-color: #e1ffd4; align-self: flex-end; margin-left: auto; }
        .ai-msg { background-color: #ffffff; border: 1px solid #e2e8f0; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #e2e8f0; gap: 10px; }
        input, textarea { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 10px 20px; border: none; background-color: #3498db; color: white; border-radius: 8px; cursor: pointer; }
        .ai-btn { background-color: #2ecc71; }
    </style>
</head>
<body>

    <div id="operator-panel">
        <h3>🧙‍♂️ Mode Magicien</h3>
        <label>🔑 Clé API :</label>
        <input type="password" id="gemini-key" placeholder="AQ.Ab8RN6L...">
        <p>Client : <strong id="current-target-name">En attente...</strong></p>
        <button class="ai-btn" id="generate-ai-btn">🤖 Générer & Envoyer avec Piu AI</button>
    </div>

    <div id="chat-container">
        <div id="ai-header">🐣 <h1>Piu AI</h1></div>
        <div id="login-screen" style="display:flex; flex-direction:column; align-items:center; padding:50px;">
            <h2>Bienvenue !</h2>
            <input type="text" id="username-input" placeholder="Ton prénom...">
            <button id="start-chat-btn" style="margin-top:10px;">Accéder au Chat</button>
        </div>
        <div id="chat-screen">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="customer-input" placeholder="Message...">
                <button id="send-customer-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUsername = "";
        let lastUserMessage = "";
        const chatRef = ref(db, 'chat_session/messages');
        const userRef = ref(db, 'chat_session/user');

        // Éléments
        const generateAiBtn = document.getElementById('generate-ai-btn');
        const geminiKeyInput = document.getElementById('gemini-key');

        // Login
        document.getElementById('start-chat-btn').addEventListener('click', () => {
            currentUsername = document.getElementById('username-input').value;
            set(userRef, currentUsername);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
        });

        // Chat
        onValue(chatRef, (snapshot) => {
            const messagesContainer = document.getElementById('messages');
            messagesContainer.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === 'user' ? 'user-msg' : 'ai-msg'}`;
                    div.innerText = msg.text;
                    messagesContainer.appendChild(div);
                    if(msg.sender === 'user') lastUserMessage = msg.text;
                });
            }
        });

        document.getElementById('send-customer-btn').addEventListener('click', () => {
            const input = document.getElementById('customer-input');
            push(chatRef, { text: `${currentUsername}: ${input.value}`, sender: 'user', timestamp: Date.now() });
            input.value = "";
        });

        // IA Automatique
        generateAiBtn.addEventListener('click', async () => {
            const apiKey = geminiKeyInput.value.trim();
            if(!apiKey) return alert("Colle ta clé API !");
            
            generateAiBtn.innerText = "Réflexion...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tu es Piu AI, un petit poussin mignon. Réponds à : ${lastUserMessage}` }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // Envoi direct dans le chat
                push(chatRef, { text: aiText, sender: 'ai', timestamp: Date.now() });
                
            } catch (e) {
                alert("Erreur, vérifie ta clé.");
            }
            generateAiBtn.innerText = "🤖 Générer & Envoyer avec Piu AI";
        });
    </script>
</body>
</html>
