<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piu AI - Chat Live (Gemini)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; display: flex; height: 100vh; }
        
        /* Panneau Magicien */
        #operator-panel { width: 320px; background-color: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; overflow-y: auto; }
        body.client-mode #operator-panel { display: none; }
        
        /* Chat */
        #chat-container { flex: 1; display: flex; flex-direction: column; background: white; }
        #ai-header { padding: 15px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; background: white; }
        #ai-header h1 { margin: 0; font-size: 1.2rem; color: #1e293b; }
        #chat-screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background-color: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; margin: 5px 0; word-wrap: break-word; }
        .user-msg { background-color: #e1ffd4; align-self: flex-end; }
        .ai-msg { background-color: #ffffff; border: 1px solid #e2e8f0; align-self: flex-start; }
        
        .input-area { display: flex; padding: 15px; border-top: 1px solid #e2e8f0; gap: 10px; background: white; }
        input, textarea { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.95rem; }
        textarea { width: 93%; height: 60px; resize: none; }
        .api-input { background-color: #34495e; border: 1px solid #7f8c8d; color: white; width: 93%; }
        
        button { padding: 10px 15px; border: none; background-color: #3498db; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .ai-btn { background-color: #2ecc71; }
        .ai-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <!-- PANNEAU OPÉRATEUR (Toi) -->
    <div id="operator-panel">
        <h3>🧙‍♂️ Mode Magicien</h3>
        <label>🔑 Ta Clé Gemini :</label>
        <input type="password" id="gemini-key" class="api-input" placeholder="Colle ta clé AQ... ici">
        
        <p>Client : <strong id="current-target-name">En attente...</strong></p>
        <hr style="border-color: #4f5d73; width: 100%;">
        
        <label>Réponse manuelle ou IA :</label>
        <textarea id="operator-reply" placeholder="Écris un message ou laisse l'IA générer..."></textarea>
        
        <!-- Option 1 : Répondre soi-même -->
        <button id="send-manual-btn">🚀 Envoyer mon message</button>
        
        <!-- Option 2 : Demander à l'IA d'envoyer directement -->
        <button class="ai-btn" id="generate-ai-btn">🤖 Générer & Envoyer (IA)</button>
    </div>

    <!-- INTERFACE CLIENT -->
    <div id="chat-container">
        <div id="ai-header">🐣 <h1>Piu AI</h1></div>
        
        <!-- Écran de connexion -->
        <div id="login-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:15px;">
            <div style="font-size: 80px;">🐣</div>
            <h2>Bienvenue sur Piu AI</h2>
            <input type="text" id="username-input" placeholder="Ton prénom..." style="width: 250px;">
            <button id="start-chat-btn">Accéder au Chat</button>
        </div>

        <!-- Écran du Chat -->
        <div id="chat-screen">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="customer-input" placeholder="Pose ta question à Piu AI...">
                <button id="send-customer-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUsername = "";
        let lastUserMessage = "";
        const chatRef = ref(db, 'chat_session/messages');
        const userRef = ref(db, 'chat_session/user');

        const geminiKeyInput = document.getElementById('gemini-key');
        const operatorReply = document.getElementById('operator-reply');

        // Mode client masqué (?client=1)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('client')) { document.body.classList.add('client-mode'); }

        // Connexion client
        document.getElementById('start-chat-btn').addEventListener('click', () => {
            const name = document.getElementById('username-input').value.trim();
            if(name) {
                currentUsername = name;
                set(userRef, name);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            }
        });

        // Afficher le nom du client chez le magicien
        onValue(userRef, (snapshot) => {
            const name = snapshot.val();
            if(name) document.getElementById('current-target-name').innerText = `👤 ${name}`;
        });

        // Charger et synchroniser les messages
        onValue(chatRef, (snapshot) => {
            const messagesContainer = document.getElementById('messages');
            messagesContainer.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === 'user' ? 'user-msg' : 'ai-msg'}`;
                    div.innerText = msg.text;
                    messagesContainer.appendChild(div);
                    if(msg.sender === 'user') {
                        // On récupère uniquement le texte après le prénom
                        lastUserMessage = msg.text.includes(':') ? msg.text.substring(msg.text.indexOf(':') + 2) : msg.text;
                    }
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        });

        // Client envoie son message
        document.getElementById('send-customer-btn').addEventListener('click', () => {
            const input = document.getElementById('customer-input');
            if(input.value.trim() !== "") {
                push(chatRef, { text: `${currentUsername}: ${input.value.trim()}`, sender: 'user', timestamp: Date.now() });
                input.value = "";
            }
        });

        // OPTION 1 : Répondre soi-même manuellement
        document.getElementById('send-manual-btn').addEventListener('click', () => {
            const text = operatorReply.value.trim();
            if(text) {
                push(chatRef, { text: text, sender: 'ai', timestamp: Date.now() });
                operatorReply.value = "";
            }
        });

        // OPTION 2 : Appel Gemini (Nouvelle URL corrigée v1/gemini-2.5-flash)
        document.getElementById('generate-ai-btn').addEventListener('click', async () => {
            const apiKey = geminiKeyInput.value.trim();
            if(!apiKey) return alert("N'oublie pas de coller ta clé API !");
            if(!lastUserMessage) return alert("Le client n'a pas encore écrit.");
            
            operatorReply.value = "⚡ Piu AI réfléchit...";

            try {
                // Version d'API stable v1 avec le bon modèle
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tu es Piu AI, un petit poussin trop mignon dans sa coquille. Réponds gentiment à cette question : ${lastUserMessage}` }] }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                const aiText = data.candidates[0].content.parts[0].text;
                
                // Envoi direct au client
                push(chatRef, { text: aiText, sender: 'ai', timestamp: Date.now() });
                operatorReply.value = "";
                
            } catch (e) {
                alert("Erreur clé : " + e.message);
                operatorReply.value = "";
            }
        });
    </script>
</body>
</html>
