<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piu AI - Dashboard Multi-Client</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Interface Opérateur */
        #operator-panel {
            width: 320px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 10;
        }

        body.client-mode #operator-panel { display: none !important; }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        #ai-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #ai-header h1 { margin: 0; font-size: 1.2rem; color: #1e293b; font-weight: 700; }
        #ai-header .status-dot { width: 8px; height: 8px; background-color: #2ecc71; border-radius: 50%; margin-left: auto; }
        #logout-btn { background-color: #e74c3c; padding: 5px 10px; font-size: 0.8rem; border-radius: 5px; }
        #logout-btn:hover { background-color: #c0392b; }

        #client-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .client-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-weight: bold;
            transition: background 0.2s;
        }

        .client-btn:hover, .client-btn.active {
            background: #1abc9c;
        }

        /* Style du Toggle Switch pour l'automatisation */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 5px 0;
            background: #34495e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #4f5d73;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #7f8c8d;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(26px); }

        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            padding: 20px;
        }

        .login-logo { width: 150px; height: 150px; font-size: 80px; display: flex; align-items: center; justify-content: center; }
        #chat-screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #f8fafc;
        }

        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; margin: 5px 0; word-wrap: break-word; font-size: 0.95rem; }
        .user-msg { background-color: #e1ffd4; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background-color: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }

        /* Animation des 3 poussins qui sautent */
        .piu-thinking {
            align-self: flex-start;
            background-color: #ffffff;
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            display: none;
            gap: 5px;
            font-size: 1.2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .piu-thinking span {
            display: inline-block;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .piu-thinking span:nth-child(2) { animation-delay: 0.2s; }
        .piu-thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .input-area { display: flex; padding: 15px; border-top: 1px solid #e2e8f0; gap: 10px; background: white; }
        input[type="text"], input[type="password"], textarea { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; }
        .login-input { flex: none !important; width: 250px; }
        .api-input { background-color: #34495e; border: 1px solid #7f8c8d; color: white; padding: 8px; border-radius: 5px; }

        button { padding: 10px 20px; border: none; background-color: #3498db; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .ai-btn { background-color: #2ecc71; }
        .ai-btn:hover { background-color: #27ae60; }
        .login-actions { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="operator-panel">
        <h3>🧙‍♂️ Mode Magicien</h3>
        <label for="mistral-key">🔑 Ta Clé Mistral AI :</label>
        <input type="password" id="mistral-key" class="api-input" value="lMPgW2PjMBQ2rZmdNN7pg8BsQiU3eqgs" style="width: 90%;">
        
        <hr style="border-color: #4f5d73; width: 100%;">
        <h4>Clients actifs :</h4>
        <div id="client-list"></div>
        <hr style="border-color: #4f5d73; width: 100%;">

        <!-- Bouton Glissable Réponse Auto -->
        <div class="switch-container">
            <span>🤖 Réponse auto (IA)</span>
            <label class="switch">
                <input type="checkbox" id="auto-reply-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <label for="operator-reply">Ta réponse manuelle :</label>
        <textarea id="operator-reply" rows="4" placeholder="Écris ici pour envoyer manuellement..."></textarea>
        
        <button class="ai-btn" id="generate-ai-btn" style="width: 100%; margin-bottom: 5px;">🤖 Générer & Envoyer direct</button>
        <button id="send-operator-btn" style="width: 100%;">🚀 Envoyer manuel</button>
    </div>

    <div id="chat-container">
        <div id="ai-header">
            <div class="logo-container">🐣</div>
            <h1 id="header-title">Piu AI</h1>
            <button id="logout-btn" style="display: none;">Déconnexion</button>
            <div class="status-dot"></div>
        </div>

        <div id="login-screen">
            <div class="login-logo">🐣</div>
            <h2>Bienvenue sur Piu AI</h2>
            <input type="text" id="username-input" class="login-input" placeholder="Nom d'utilisateur...">
            <input type="password" id="password-input" class="login-input" placeholder="Mot de passe...">
            <div class="login-actions">
                <button id="login-btn">Se connecter</button>
                <button id="register-btn" style="background-color: #2ecc71;">Créer un compte</button>
            </div>
        </div>

        <div id="chat-screen">
            <div id="messages"></div>
            
            <div id="thinking-indicator" class="piu-thinking">
                <span>🐣</span><span>🐤</span><span>🐥</span>
            </div>

            <div class="input-area">
                <input type="text" id="customer-input" placeholder="Posez votre question...">
                <button id="send-customer-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            authDomain: "fakeai-fd878.firebaseapp.com",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878",
            storageBucket: "fakeai-fd878.firebasestorage.app",
            messagingSenderId: "57755076394",
            appId: "1:57755076394:web:b43c4209665d24149e0053",
            measurementId: "G-TM20HEFXRR"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUsername = "";
        let activeChatRef = null;
        let lastUserMessage = "";
        let currentListener = null;
        let autoReplyEnabled = false; // Stocke l'état du bouton magique

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('client')) { document.body.classList.add('client-mode'); }

        // Écouter le bouton d'automatisation
        document.getElementById('auto-reply-toggle').addEventListener('change', (e) => {
            autoReplyEnabled = e.target.checked;
        });

        function makeFakeEmail(username) {
            return username.toLowerCase().replace(/[^a-z0-9]/g, "") + "@piuai.local";
        }

        // Gestion de la session de connexion
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUsername = user.email.split('@')[0];
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('header-title').innerText = `Piu AI (${currentUsername})`;
                
                activeChatRef = ref(db, 'chats/' + currentUsername + '/messages');
                listenToChat(activeChatRef);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('chat-screen').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('header-title').innerText = "Piu AI";
                if (currentListener) { currentListener(); currentListener = null; }
                document.getElementById('messages').innerHTML = "";
            }
        });

        // AUTH : Créer un compte
        document.getElementById('register-btn').addEventListener('click', () => {
            const name = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            if (!name || !password) return alert("⚠️ Remplis tous les champs !");
            if (password.length < 6) return alert("⚠️ Mot de passe : 6 caractères min.");

            createUserWithEmailAndPassword(auth, makeFakeEmail(name), password)
                .then(() => alert("🎉 Compte créé et connecté !"))
                .catch((err) => alert(err.code === 'auth/email-already-in-use' ? "❌ Déjà pris !" : err.message));
        });

        // AUTH : Se connecter
        document.getElementById('login-btn').addEventListener('click', () => {
            const name = document.getElementById('username-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            if (!name || !password) return alert("⚠️ Remplis tous les champs !");

            signInWithEmailAndPassword(auth, makeFakeEmail(name), password)
                .catch(() => alert("❌ Identifiants incorrects."));
        });

        // AUTH : Déconnexion
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                document.getElementById('username-input').value = "";
                document.getElementById('password-input').value = "";
            });
        });

        // OPÉRATEUR : Liste des clients
        onValue(ref(db, 'chats'), (snapshot) => {
            const listContainer = document.getElementById('client-list');
            listContainer.innerHTML = "";
            const clients = snapshot.val() || {};
            
            Object.keys(clients).forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'client-btn';
                btn.innerText = "👤 " + name;
                
                btn.onclick = () => {
                    document.querySelectorAll('.client-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeChatRef = ref(db, 'chats/' + name + '/messages');
                    listenToChat(activeChatRef);
                };
                listContainer.appendChild(btn);
            });
        });

        // Écouter le chat et déclencher l'automatisation si activée
        function listenToChat(chatRef) {
            if (currentListener) { currentListener(); }

            currentListener = onValue(chatRef, (snapshot) => {
                const msgsContainer = document.getElementById('messages');
                msgsContainer.innerHTML = ""; 
                
                const data = snapshot.val() || {};
                const messagesList = Object.values(data);
                
                messagesList.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === 'user' ? 'user-msg' : 'ai-msg'}`;
                    div.innerText = msg.text;
                    msgsContainer.appendChild(div);
                });
                msgsContainer.scrollTop = msgsContainer.scrollHeight;

                // Analyser le dernier message arrivé
                const lastMsg = messagesList[messagesList.length - 1];
                if (lastMsg && lastMsg.sender === 'user') {
                    lastUserMessage = lastMsg.text.includes(':') ? lastMsg.text.substring(lastMsg.text.indexOf(':') + 2) : lastMsg.text;
                    
                    // Déclencheur Automatique !
                    if (autoReplyEnabled) {
                        fetchMistralAI(lastUserMessage);
                    }
                }
            });
        }

        // Envoi Client
        document.getElementById('send-customer-btn').addEventListener('click', () => {
            const input = document.getElementById('customer-input');
            const text = input.value.trim();
            if(text !== "" && activeChatRef) {
                push(activeChatRef, { text: `${currentUsername}: ${text}`, sender: 'user', timestamp: Date.now() });
                input.value = "";
            }
        });

        // Fonction universelle d'appel à Mistral AI
        async function fetchMistralAI(question) {
            if(!activeChatRef) return;
            const apiKey = document.getElementById('mistral-key').value.trim();
            const indicator = document.getElementById('thinking-indicator');
            const msgsContainer = document.getElementById('messages');

            indicator.style.display = 'flex';
            msgsContainer.scrollTop = msgsContainer.scrollHeight;

            try {
                const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "open-mistral-7b",
                        messages: [
                            { role: "system", content: "Tu es Piu AI, un petit poussin super intelligent et mignon dans sa coquille. Réponds amicalement en français avec des emojis d'oiseaux." },
                            { role: "user", content: question }
                        ]
                    })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                
                push(activeChatRef, { text: aiText, sender: 'ai', timestamp: Date.now() });
            } catch (e) { 
                console.error("Erreur API Mistral:", e); 
            } finally {
                indicator.style.display = 'none';
            }
        }

        // Envoi manuel de l'IA (via bouton vert)
        document.getElementById('generate-ai-btn').addEventListener('click', () => {
            if(!activeChatRef) return alert("❌ Sélectionne un client d'abord !");
            if(!lastUserMessage) return alert("Aucun message à traiter.");
            fetchMistralAI(lastUserMessage);
        });

        // Envoi manuel de l'opérateur (via texte libre)
        document.getElementById('send-operator-btn').addEventListener('click', () => {
            const textarea = document.getElementById('operator-reply');
            const text = textarea.value.trim();
            if(text !== "" && activeChatRef) {
                push(activeChatRef, { text: text, sender: 'ai', timestamp: Date.now() });
                textarea.value = "";
            }
        });
    </script>
</body>
</html>
