    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            authDomain: "fakeai-fd878.firebaseapp.com",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878",
            storageBucket: "fakeai-fd878.firebasestorage.app",
            messagingSenderId: "57755076394",
            appId: "1:57755076394:web:b43c4209665d24149e0053",
            measurementId: "G-TM20HEFXRR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUsername = "";
        let lastUserMessage = ""; 
        const chatRef = ref(db, 'chat_session/messages');
        const userRef = ref(db, 'chat_session/user');

        const geminiKeyInput = document.getElementById('gemini-key');
        const operatorReply = document.getElementById('operator-reply');

        // Initialisation de l'interface
        document.getElementById('start-chat-btn').addEventListener('click', () => {
            const name = document.getElementById('username-input').value.trim();
            if(name !== "") {
                currentUsername = name;
                set(userRef, name);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            }
        });

        onValue(chatRef, (snapshot) => {
            const messagesContainer = document.getElementById('messages');
            messagesContainer.innerHTML = ""; 
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === 'user' ? 'user-msg' : 'ai-msg'}`;
                    div.innerText = msg.text;
                    messagesContainer.appendChild(div);
                    if(msg.sender === 'user') {
                        lastUserMessage = msg.text.includes(':') ? msg.text.substring(msg.text.indexOf(':') + 2) : msg.text;
                    }
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        });

        document.getElementById('send-customer-btn').addEventListener('click', () => {
            const input = document.getElementById('customer-input');
            if(input.value.trim() !== "") {
                push(chatRef, { text: `${currentUsername}: ${input.value.trim()}`, sender: 'user', timestamp: Date.now() });
                input.value = "";
            }
        });

        // 3. APPEL À L'IA (Envoi automatique direct au client)
        async function fetchGeminiAI(question) {
            const apiKey = geminiKeyInput.value.trim();
            if(!apiKey) return alert("⚠️ Clé manquante !");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tu es Piu AI, un poussin mignon. Réponds amicalement à : ${question}` }] }]
                    })
                });

                if(!response.ok) throw new Error("Erreur API");

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                // ENVOI AUTOMATIQUE DIRECT
                push(chatRef, { text: aiText, sender: 'ai', timestamp: Date.now() });

            } catch (error) {
                alert("Erreur Gemini. Vérifie ta clé.");
            }
        }

        // Bouton IA (Envoie direct)
        document.getElementById('generate-ai-btn').addEventListener('click', () => {
            if(!lastUserMessage) return alert("Pas de question reçue !");
            fetchGeminiAI(lastUserMessage);
        });

        // Bouton envoi manuel (toujours dispo)
        document.getElementById('send-operator-btn').addEventListener('click', () => {
            const text = operatorReply.value.trim();
            if(text !== "") {
                push(chatRef, { text: text, sender: 'ai', timestamp: Date.now() });
                operatorReply.value = "";
            }
        });
    </script>
