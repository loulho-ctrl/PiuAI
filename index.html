<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Support Chat Live & Vraie IA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Interface Opérateur (Invisible pour le client si "?client=1" est dans l'URL) */
        #operator-panel {
            width: 320px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        /* Mode Client Unique : Cache le panneau opérateur */
        body.client-mode #operator-panel {
            display: none;
        }

        /* Zone de Chat Principale */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }

        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 10px;
        }

        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            margin: 5px 0;
            word-wrap: break-word;
        }

        .user-msg {
            background-color: #e1ffd4;
            align-self: flex-end;
        }

        .ai-msg {
            background-color: #f1f0f0;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
            gap: 10px;
        }

        input[type="text"], textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Sécurité Clé API */
        .api-input {
            background-color: #34495e;
            border: 1px solid #7f8c8d;
            color: white;
            padding: 8px;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #2980b9; }
        .ai-btn { background-color: #2ecc71; }
        .ai-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <!-- PANNEAU OPÉRATEUR (Toi) -->
    <div id="operator-panel">
        <h3>🧙‍♂️ Mode Magicien (Toi)</h3>
        
        <!-- Case Secrète pour coller ta clé en direct -->
        <label for="openai-key">🔑 Ta Clé OpenAI (sk-...) :</label>
        <input type="password" id="openai-key" class="api-input" placeholder="Colle ta clé ici pour jouer...">
        
        <hr style="border-color: #4f5d73; width: 100%;">
        
        <p>Client Actif : <strong id="current-target-name">En attente...</strong></p>

        <hr style="border-color: #4f5d73; width: 100%;">

        <label for="operator-reply">Ta réponse secrète :</label>
        <textarea id="operator-reply" rows="5" placeholder="L'IA mettra sa réponse ici, tu pourras la modifier avant d'envoyer !"></textarea>
        
        <button class="ai-btn" id="generate-ai-btn">🤖 Générer avec VRAIE IA (OpenAI)</button>
        <button id="send-operator-btn">🚀 Envoyer comme "IA"</button>
    </div>

    <!-- INTERFACE CLIENT -->
    <div id="chat-container">
        <!-- Étape 1 : Connexion Client -->
        <div id="login-screen">
            <h2>Bienvenue sur l'Assistant IA</h2>
            <p>Entrez votre prénom pour commencer :</p>
            <input type="text" id="username-input" placeholder="Votre prénom...">
            <button id="start-chat-btn">Démarrer la conversation</button>
        </div>

        <!-- Étape 2 : Le Chat -->
        <div id="chat-screen">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="customer-input" placeholder="Posez votre question à l'IA...">
                <button id="send-customer-btn">Envoyer</button>
            </div>
        </div>
    </div>

    <!-- Chargement de Firebase via CDN (Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Tes configurations Firebase déjà en place :
        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            authDomain: "fakeai-fd878.firebaseapp.com",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878",
            storageBucket: "fakeai-fd878.firebasestorage.app",
            messagingSenderId: "57755076394",
            appId: "1:57755076394:web:b43c4209665d24149e0053",
            measurementId: "G-TM20HEFXRR"
        };

        // Initialisation de Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variables globales de référence
        let currentUsername = "";
        let lastUserMessage = ""; // Pour retenir la dernière question du client
        const chatRef = ref(db, 'chat_session/messages');
        const userRef = ref(db, 'chat_session/user');

        // Éléments DOM
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const usernameInput = document.getElementById('username-input');
        const startChatBtn = document.getElementById('start-chat-btn');
        const targetNameDisplay = document.getElementById('current-target-name');
        const messagesContainer = document.getElementById('messages');
        const customerInput = document.getElementById('customer-input');
        const sendCustomerBtn = document.getElementById('send-customer-btn');
        const operatorReply = document.getElementById('operator-reply');
        const generateAiBtn = document.getElementById('generate-ai-btn');
        const sendOperatorBtn = document.getElementById('send-operator-btn');
        const openaiKeyInput = document.getElementById('openai-key');

        // Mode client masqué via ?client=1
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('client')) {
            document.body.classList.add('client-mode');
        }

        // 1. Quand le client entre son prénom
        startChatBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if(name !== "") {
                currentUsername = name;
                set(userRef, name);
                
                loginScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
            }
        });

        // L'opérateur reçoit le nom en direct
        onValue(userRef, (snapshot) => {
            const name = snapshot.val();
            if(name) {
                targetNameDisplay.innerText = `👤 ${name}`;
            }
        });

        // Réception et synchronisation des messages en temps réel
        onValue(chatRef, (snapshot) => {
            messagesContainer.innerHTML = ""; 
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(msg => {
                    appendMessageHtml(msg.text, msg.sender);
                    // On garde en mémoire le dernier message envoyé par le client pour l'IA
                    if(msg.sender === 'user') {
                        // On enlève le "Nom: " au début du texte pour n'avoir que la question
                        lastUserMessage = msg.text.substring(msg.text.indexOf(':') + 2);
                    }
                });
            }
        });

        function appendMessageHtml(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-msg' : 'ai-msg');
            msgDiv.innerText = text;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 2. Le client envoie son message
        sendCustomerBtn.addEventListener('click', () => {
            const text = customerInput.value.trim();
            if(text !== "") {
                push(chatRef, {
                    text: `${currentUsername}: ${text}`,
                    sender: 'user',
                    timestamp: Date.now()
                });
                customerInput.value = "";
            }
        });

        // 3. APPEL À LA VRAIE IA D'OPENAI (Déclenché par ton bouton)
        async function fetchRealAI(question) {
            const apiKey = openaiKeyInput.value.trim();
            
            if(!apiKey) {
                alert("⚠️ Oups ! Tu as oublié de coller ta clé OpenAI tout en haut du panneau de gauche.");
                operatorReply.value = "";
                return;
            }

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini", // Modèle récent, très rapide et très économique
                        messages: [
                            { role: "system", content: "Tu es un assistant IA drôle, poli et très intelligent." },
                            { role: "user", content: question }
                        ],
                        max_tokens: 300
                    })
                });

                if(!response.ok) {
                    throw new Error("Erreur de réponse de l'API OpenAI. Vérifie ta clé ou tes crédits.");
                }

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                
                // On met la réponse reçue dans ton bloc de texte
                operatorReply.value = aiText;

            } catch (error) {
                console.error(error);
                alert("Erreur lors de l'appel à OpenAI. Regarde la console de ton navigateur.");
                operatorReply.value = "Impossible de générer une réponse automatique.";
            }
        }

        // Clic sur le bouton de génération automatique
        generateAiBtn.addEventListener('click', () => {
            if(!lastUserMessage) {
                alert("Le client n'a pas encore posé de question !");
                return;
            }
            operatorReply.value = "⚡ ChatGPT est en train de réfléchir...";
            fetchRealAI(lastUserMessage);
        });

        // 4. L'opérateur valide et envoie la réponse finale sur Firebase
        sendOperatorBtn.addEventListener('click', () => {
            const replyText = operatorReply.value.trim();
            if(replyText !== "") {
                push(chatRef, {
                    text: replyText,
                    sender: 'ai',
                    timestamp: Date.now()
                });
                operatorReply.value = "";
            }
        });
    </script>
</body>
</html>
