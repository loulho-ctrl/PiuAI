<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piu AI - Magicien</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f6f9; }
        #operator-panel { width: 350px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #chat-container { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; }
        .message { padding: 10px; margin: 5px; border-radius: 10px; }
        .user-msg { background: #e1ffd4; align-self: flex-end; }
        .ai-msg { background: white; border: 1px solid #ccc; }
        textarea { width: 100%; height: 80px; }
    </style>
</head>
<body>

    <div id="operator-panel">
        <h3>🧙‍♂️ Mode Magicien</h3>
        <input type="password" id="gemini-key" placeholder="Ta clé API ici...">
        <p>Réponse manuelle ou IA :</p>
        <textarea id="operator-reply" placeholder="Écris ici ou laisse l'IA remplir..."></textarea>
        
        <!-- Bouton 1 : Envoyer ta propre réponse -->
        <button id="send-manual-btn" style="background: #3498db; color: white; border:none; padding:10px;">Envoyer mon message</button>
        
        <!-- Bouton 2 : Envoyer la réponse de l'IA -->
        <button id="generate-ai-btn" style="background: #2ecc71; color: white; border:none; padding:10px;">🤖 Générer et envoyer (IA)</button>
    </div>

    <div id="chat-container">
        <div id="messages"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSqcoCPrAbmC2LxCRDCKD82UlFyZRmYdY",
            databaseURL: "https://fakeai-fd878-default-rtdb.firebaseio.com",
            projectId: "fakeai-fd878"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const chatRef = ref(db, 'chat_session/messages');
        let lastUserMessage = "";

        // Charger les messages
        onValue(chatRef, (snapshot) => {
            const div = document.getElementById('messages');
            div.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.values(data).forEach(msg => {
                    const m = document.createElement('div');
                    m.className = `message ${msg.sender === 'user' ? 'user-msg' : 'ai-msg'}`;
                    m.innerText = msg.text;
                    div.appendChild(m);
                    if(msg.sender === 'user') lastUserMessage = msg.text;
                });
            }
        });

        // 1. Bouton : Envoyer MANUELLEMENT
        document.getElementById('send-manual-btn').addEventListener('click', () => {
            const text = document.getElementById('operator-reply').value;
            if(text) {
                push(chatRef, { text: text, sender: 'ai', timestamp: Date.now() });
                document.getElementById('operator-reply').value = "";
            }
        });

        // 2. Bouton : IA (avec une URL plus générique pour éviter les erreurs)
        document.getElementById('generate-ai-btn').addEventListener('click', async () => {
            const apiKey = document.getElementById('gemini-key').value.trim();
            if(!apiKey) return alert("Clé manquante !");

            try {
                // Utilisation de gemini-1.5-flash qui est plus compatible avec toutes les clés
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Réponds à ceci de façon mignonne comme un poussin : " + lastUserMessage }] }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                const aiText = data.candidates[0].content.parts[0].text;
                push(chatRef, { text: aiText, sender: 'ai', timestamp: Date.now() });
            } catch (e) {
                alert("Erreur clé : " + e.message);
            }
        });
    </script>
</body>
</html>
